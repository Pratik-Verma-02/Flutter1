name: primexkey
description: Professional offline Android utility for generating JKS keystores and extracting SHA fingerprints.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  file_picker: ^8.0.0
  permission_handler: ^11.1.0
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  pointycastle: ^3.7.3
  crypto: ^3.0.3
  flutter_animate: ^4.3.0
  google_fonts: ^6.1.0
  intl: ^0.19.0
  uuid: ^4.2.2
  path: ^1.8.3
  asn1lib: ^1.4.0
  basic_utils: ^5.6.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.8

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#0A0E21"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter_native_splash:
  color: "#0A0E21"
  image: assets/images/logo.png
  android: true
  ios: true
  android_12:
    color: "#0A0E21"
    image: assets/images/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
